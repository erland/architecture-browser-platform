services:
  postgres:
    image: postgres:16
    container_name: architecture-browser-platform-dev-postgres
    environment:
      POSTGRES_DB: architecture_browser_platform
      POSTGRES_USER: architecture_browser
      POSTGRES_PASSWORD: architecture_browser
    ports:
      - "5432:5432"
    volumes:
      - platform-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architecture_browser -d architecture_browser_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: maven:3.9.11-eclipse-temurin-25
    container_name: architecture-browser-platform-dev-api
    working_dir: /workspace/apps/api
    command: mvn quarkus:dev -Dquarkus.http.host=0.0.0.0
    environment:
      PLATFORM_DB_JDBC_URL: jdbc:postgresql://postgres:5432/architecture_browser_platform
      PLATFORM_DB_USERNAME: architecture_browser
      PLATFORM_DB_PASSWORD: architecture_browser
      PLATFORM_INDEXER_MODE: remote
      PLATFORM_INDEXER_BASE_URL: http://indexer:8080
    ports:
      - "8080:8080"
    volumes:
      - ../../:/workspace
      - ../../../:/host-workspace
      - platform-dev-maven-repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      indexer:
        condition: service_started

  indexer:
    build:
      context: ../../../architecture-browser-indexer
      dockerfile: Dockerfile
    container_name: architecture-browser-platform-dev-indexer
    environment:
      ARCH_BROWSER_TREE_SITTER_LIB_DIR: /app/lib/macos-aarch64
    ports:
      - "8082:8080"
    volumes:
      - ../../../:/host-workspace
      - ../../docs/samples/smoke-repo:/workspace/smoke-repo:ro

  web:
    image: node:20
    container_name: architecture-browser-platform-dev-web
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @architecture-browser-platform/web -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../:/workspace
    depends_on:
      - api

volumes:
  platform-dev-postgres-data:
  platform-dev-maven-repo:
