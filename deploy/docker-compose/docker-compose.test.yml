services:
  postgres:
    image: postgres:16
    container_name: architecture-browser-platform-test-postgres
    env_file:
      - ../env/platform-test.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-architecture_browser_platform}
      POSTGRES_USER: ${POSTGRES_USER:-architecture_browser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-architecture_browser}
    ports:
      - "5432:5432"
    volumes:
      - platform-test-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-architecture_browser} -d ${POSTGRES_DB:-architecture_browser_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ${PLATFORM_API_IMAGE:?Set PLATFORM_API_IMAGE in deploy/env/platform-test.env}
    container_name: architecture-browser-platform-test-api
    env_file:
      - ../env/platform-test.env
    environment:
      PLATFORM_DB_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-architecture_browser_platform}
      PLATFORM_DB_USERNAME: ${POSTGRES_USER:-architecture_browser}
      PLATFORM_DB_PASSWORD: ${POSTGRES_PASSWORD:-architecture_browser}
      PLATFORM_INDEXER_MODE: remote
      PLATFORM_INDEXER_BASE_URL: http://indexer:8080
      QUARKUS_HTTP_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      indexer:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ../../docs/samples/smoke-repo:/workspace/smoke-repo:ro
    restart: unless-stopped

  indexer:
    image: ${PLATFORM_INDEXER_IMAGE:?Set PLATFORM_INDEXER_IMAGE in deploy/env/platform-test.env}
    container_name: architecture-browser-platform-test-indexer
    environment:
      ARCH_BROWSER_TREE_SITTER_LIB_DIR: /app/lib/macos-aarch64
    ports:
      - "8082:8080"
    volumes:
      - ../../docs/samples/smoke-repo:/workspace/smoke-repo:ro
    restart: unless-stopped

  web:
    image: ${PLATFORM_WEB_IMAGE:?Set PLATFORM_WEB_IMAGE in deploy/env/platform-test.env}
    container_name: architecture-browser-platform-test-web
    depends_on:
      - api
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  platform-test-postgres-data:
