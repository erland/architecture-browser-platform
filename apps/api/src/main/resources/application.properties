quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.jackson.fail-on-unknown-properties=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${PLATFORM_DB_JDBC_URL:jdbc:postgresql://localhost:5432/architecture_browser_platform}
quarkus.datasource.username=${PLATFORM_DB_USERNAME:architecture_browser}
quarkus.datasource.password=${PLATFORM_DB_PASSWORD:architecture_browser}
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=1

quarkus.devservices.enabled=false
