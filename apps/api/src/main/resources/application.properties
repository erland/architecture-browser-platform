quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.jackson.fail-on-unknown-properties=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${PLATFORM_DB_JDBC_URL:jdbc:postgresql://localhost:5432/architecture_browser_platform}
quarkus.datasource.username=${PLATFORM_DB_USERNAME:architecture_browser}
quarkus.datasource.password=${PLATFORM_DB_PASSWORD:architecture_browser}
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=1

quarkus.devservices.enabled=false

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

platform.indexer.mode=${PLATFORM_INDEXER_MODE:stub}
platform.indexer.base-url=${PLATFORM_INDEXER_BASE_URL:http://localhost:8082}
platform.indexer.connect-timeout-seconds=${PLATFORM_INDEXER_CONNECT_TIMEOUT_SECONDS:10}
platform.indexer.read-timeout-seconds=${PLATFORM_INDEXER_READ_TIMEOUT_SECONDS:300}

quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%r %s %D
quarkus.log.category."info.isaksson.erland.architecturebrowser.platform".level=INFO
quarkus.log.category."info.isaksson.erland.architecturebrowser.platform.service.runs".level=DEBUG
